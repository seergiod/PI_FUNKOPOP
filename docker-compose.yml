services:
  # 1. Contenedor de la Base de Datos (MySQL)
  bbdd:
    image: mysql:8.0
    container_name: tienda_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: toor
      MYSQL_DATABASE: tienda_funkos
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"

  # 2. Contenedor de la aplicación Java
  java_app:
    build: .
    container_name: tienda_java
    restart: always
    depends_on:
      - bbdd
    environment:
      - DB_URL=jdbc:mysql://bbdd:3306/tienda_funkos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USER=root
      - DB_PASSWORD=toor

  # 3. Contenedor para el servidor Web (HTML estático + Autenticación Automática)
  web_html:
    image: nginx:latest
    container_name: tienda_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DESCARGAS_USER=amigo1       # <-- Tu usuario para la descarga
      - DESCARGAS_PASSWORD=toor     # <-- Tu contraseña para la descarga
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
    # Comando corregido: escribe en /tmp/ donde no hay problemas de permisos en Nginx
    command: >
      /bin/sh -c "
      apt-get update && apt-get install -y apache2-utils &&
      htpasswd -b -c /tmp/.htpasswd $$DESCARGAS_USER $$DESCARGAS_PASSWORD &&
      echo '=> Archivo .htpasswd generado con éxito en /tmp/.' &&
      nginx -g 'daemon off;'
      "

# Volumen global para que los datos de MySQL no se pierdan al apagar los contenedores
volumes:
  mysql_data: